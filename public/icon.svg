<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="">
  <rect width="512" height="512" fill="#155335" rx="112"/>
  <!-- Seed packet envelope body -->
  <rect x="96" y="128" width="320" height="260" rx="18" fill="#e8d5a0"/>
  <!-- Envelope shadow/depth -->
  <rect x="96" y="128" width="320" height="260" rx="18" fill="none" stroke="#c9a470" stroke-width="6" opacity="0.5"/>
  <!-- Envelope flap -->
  <path d="M 96 128 L 256 220 L 416 128 Z" fill="#d4b878"/>
  <!-- Botanical stem -->
  <line x1="256" y1="388" x2="256" y2="276" stroke="#4a7c3f" stroke-width="12" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M 256 330 Q 184 300 170 250 Q 218 270 256 330 Z" fill="#4a7c3f"/>
  <path d="M 256 330 Q 328 300 342 250 Q 294 270 256 330 Z" fill="#52904a" opacity="0.85"/>
  <!-- Sunflower head -->
  <!-- Petals -->
  <g transform="translate(256 252)">
    <ellipse rx="14" ry="32" fill="#d69e2e" transform="rotate(0)"/>
    <ellipse rx="14" ry="32" fill="#d69e2e" transform="rotate(30)"/>
    <ellipse rx="14" ry="32" fill="#d69e2e" transform="rotate(60)"/>
    <ellipse rx="14" ry="32" fill="#d69e2e" transform="rotate(90)"/>
    <ellipse rx="14" ry="32" fill="#d69e2e" transform="rotate(120)"/>
    <ellipse rx="14" ry="32" fill="#d69e2e" transform="rotate(150)"/>
  </g>
  <!-- Flower center -->
  <circle cx="256" cy="252" r="38" fill="#5a3010"/>
  <circle cx="256" cy="252" r="26" fill="#3d1f08" opacity="0.7"/>
  <!-- Loose seeds at base -->
  <ellipse cx="180" cy="420" rx="14" ry="22" fill="#c9a06c" transform="rotate(-20 180 420)"/>
  <ellipse cx="218" cy="430" rx="14" ry="22" fill="#b87d2a" transform="rotate(-5 218 430)"/>
  <ellipse cx="256" cy="432" rx="14" ry="22" fill="#c9a06c"/>
  <ellipse cx="294" cy="430" rx="14" ry="22" fill="#b87d2a" transform="rotate(5 294 430)"/>
  <ellipse cx="332" cy="420" rx="14" ry="22" fill="#c9a06c" transform="rotate(20 332 420)"/>
</svg>
